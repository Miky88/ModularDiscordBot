commands:
  perms:
    name: perms
    description: Controlla i permessi di un utente o ruolo nel canale corrente.
    options:
      user: L’utente di cui controllare i permessi.
    messages:
      nouserindb: ":warning: Nessun utente nel database corrisponde alla tua ricerca"
  ping:
    name: ping
    description: Controlla la latenza e responsività del bot.
    messages:
      pinging: Pinging...
      pong: ":ping_pong: Pong! La latenza è **{{latency}}ms**. La latenza API è
        **{{apiLatency}}ms**"
  settings:
    name: settings
    description: Gestisci le impostazioni del server corrente
    options:
      view:
        name: view
        description: Visualizza le impostazioni correnti
      set:
        name: set
        description: Imposta un valore
        options:
          module:
            name: module
            description: Il modulo di cui visualizzare le impostazioni
          key:
            name: key
            description: L’impostazione da visualizzare
          value:
            name: value
            description: Il valore per filtrare le impostazioni
      reset:
        name: reset
        description: Ripristina un’impostazione al valore predefinito
        options:
          module:
            name: module
            description: Il modulo di cui visualizzare le impostazioni
          key:
            name: key
            description: L’impostazione da ripristinare
          value:
            name: value
            description: Il valore per filtrare le impostazioni
    embeds:
      set:
        title: Impostazione Aggiornata
        description: commands.settings.embeds.set.description
      add:
        title: Impostazione Aggiunta
        description: commands.settings.embeds.add.description
      remove:
        title: Impostazione Rimossa
        description: commands.settings.embeds.remove.description
      view:
        settings: Impostazioni Correnti
        nosettings:
          title: Nessuna Impostazione Trovata
          description: Non ci sono impostazioni configurate per questo modulo.
        page: Pagina {{page}} di {{totalPages}}
      reset:
        title: Impostazione Ripristinata
        description: L’impostazione è stata ripristinata al valore predefinito.
    ui:
      home:
        title: ⚙️ Impostazioni
        description: |
          Impostazioni del server, raggruppate per modulo. Scegli un modulo per modificare le sue chiavi.

          • Ogni chiave ha un **tipo** dichiarato (stringa, booleano, canale, …); gli editor sottostanti si adattano al tipo.
          • Per richiedere un livello specifico per una chiave individuale in questo server
        modules-with-settings: Moduli con impostazioni
        none: _(nessuno)_
        pick-placeholder: Scegli un modulo da modificare…
        keys-suffix: "{{count}} chiavi"
        overrides-suffix: "{{count}} sovrascritti"
      module:
        title: "⚙️ {{name}}"
        description: Scegli una chiave da modificare, ripristinare o ispezionare.
        keys: Chiavi
        no-keys: _(nessuna chiave)_
        pick-placeholder: Scegli una chiave…
        no-settings: "Il modulo `{{name}}` non ha impostazioni."
      key:
        title: "⚙️ {{module}}.{{key}}"
        no-description: _(nessuna descrizione)_
        type: Tipo
        default: Predefinito
        current: Corrente
        permission-override: Sovrascrizione permesso
        permission-override-value: "requires `{{level}}` (imposta con /permissions)"
        unknown: "Impostazione `{{module}}.{{key}}` sconosciuta."
      editors:
        enum-placeholder: Scegli un valore…
        bool-true: "On"
        bool-false: "Off"
        channel-placeholder: Scegli un canale…
        role-placeholder: Scegli un ruolo…
        user-placeholder: Scegli un utente…
        edit-button: Modifica valore
        array-add-button: Aggiungi valore
        array-add-channel: Aggiungi canale…
        array-add-role: Aggiungi ruolo…
        array-add-user: Aggiungi utente…
        array-remove: Rimuovi valore…
      modals:
        edit-title: "Modifica {{key}}"
        edit-label: "Nuovo valore ({{type}})"
        array-add-title: "Aggiungi a {{key}}"
        array-add-label: Valore da aggiungere
      values:
        unset: _non impostato_
        empty: _vuoto_
      buttons:
        reset: Reimposta al predefinito
        back: Indietro
        refresh: Ricarica
        close: Chiudi
      errors:
        closed: Chiuso.
        unknown-setting: Impostazione sconosciuta.
        no-settings-module: "Il modulo `{{module}}` non ha impostazioni."
  stats:
    name: stats
    description: Visualizza statistiche e informazioni sul bot.
    embed:
      title: STATISTICHE
      memusage: ⚙️ Utilizzo Memoria
      uptime: ⏱️ Tempo di attività
      versions: 🔢 Versioni
      creationdate: 🎂 Data di creazione
  setlang:
    name: setlang
    description: Imposta la tua lingua preferita per il bot
    options:
      language:
        name: language
        description: La lingua che vuoi impostare
    messages:
      invalidLang: ":warning: La lingua specificata non è supportata."
      success: ":flag_it: La tua lingua preferita è stata impostata su **Italiano**!"
      reset: ":globe_with_meridians: D'ora in poi la tua lingua sarà sincronizzata con
        la lingua predefinita!"
  permissions:
    name: commands.permissions.name
    description: commands.permissions.description
