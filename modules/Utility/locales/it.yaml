        description: commands.settings.ui.module.description
        keys: commands.settings.ui.module.keys
        no-keys: commands.settings.ui.module.no-keys
        pick-placeholder: commands.settings.ui.module.pick-placeholder
        no-settings: commands.settings.ui.module.no-settings
      key:
