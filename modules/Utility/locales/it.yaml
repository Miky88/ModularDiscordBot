commands:
  perms:
    name: perms
    description: Controlla i permessi di un utente o ruolo nel canale corrente.
    options:
      user: L’utente di cui controllare i permessi.
    messages:
      nouserindb: ":warning: Nessun utente nel database corrisponde alla tua ricerca"
  ping:
    name: ping
    description: Controlla la latenza e responsività del bot.
    messages:
      pinging: Pinging...
      pong: ":ping_pong: Pong! La latenza è **{{latency}}ms**. La latenza API è
        **{{apiLatency}}ms**"
  settings:
    name: settings
    description: Gestisci le impostazioni del server corrente
    options:
      view:
        name: view
        description: Visualizza le impostazioni correnti
      set:
        name: set
        description: Imposta un valore
        options:
          module:
            name: module
            description: Il modulo di cui visualizzare le impostazioni
          key:
            name: key
            description: L’impostazione da visualizzare
          value:
            name: value
            description: Il valore per filtrare le impostazioni
      reset:
        name: reset
        description: Ripristina un’impostazione al valore predefinito
        options:
          module:
            name: module
            description: Il modulo di cui visualizzare le impostazioni
          key:
            name: key
            description: L’impostazione da ripristinare
          value:
            name: value
            description: Il valore per filtrare le impostazioni
    embeds:
      set:
        title: Impostazione Aggiornata
        description: commands.settings.embeds.set.description
      add:
        title: Impostazione Aggiunta
        description: commands.settings.embeds.add.description
      remove:
        title: Impostazione Rimossa
        description: commands.settings.embeds.remove.description
      view:
        settings: Impostazioni Correnti
        nosettings:
          title: Nessuna Impostazione Trovata
          description: Non ci sono impostazioni configurate per questo modulo.
        page: Pagina {{page}} di {{totalPages}}
      reset:
        title: Impostazione Ripristinata
        description: L’impostazione è stata ripristinata al valore predefinito.
    ui:
      home:
        title: commands.settings.ui.home.title
        description: commands.settings.ui.home.description
        modules-with-settings: commands.settings.ui.home.modules-with-settings
        none: commands.settings.ui.home.none
        pick-placeholder: commands.settings.ui.home.pick-placeholder
        keys-suffix: commands.settings.ui.home.keys-suffix
        overrides-suffix: commands.settings.ui.home.overrides-suffix
      module:
