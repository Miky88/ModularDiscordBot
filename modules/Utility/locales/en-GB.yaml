commands:
  perms:
    name: perms
    description: Check the permissions of a user or role in the current channel.
    options:
      user: The user to check permissions for.
    messages:
      nouserindb: ":warning: There's no user in database matching your query"
  ping:
    name: ping
    description: Check the bot's latency and responsiveness.
    messages:
      pinging: "Pinging..."
      pong: ":ping_pong: Pong! Latency is **{{latency}}ms**. API Latency is **{{apiLatency}}ms**"
  settings:
    name: settings
    description: View and change the bot's settings for this server.
    ui:
      home:
        title: ⚙️ Settings
        description: |
          Customise how the bot works on this server. Settings are grouped by feature — open one below to see what you can change.

          Each option shows its current value, and you get the right kind of editor (a toggle, a channel picker, and so on) when you change it.
        none: _(none)_
        module-summary: "{{keys}} setting(s) · {{commands}} command(s)"
      module:
        title: "⚙️ {{name}}"
        description: This module's settings (above) and its command permissions (below).
        settings-field: Settings
        no-keys: _(no keys)_
        no-settings: "Module `{{name}}` has no settings."
        unknown: "No such module `{{name}}`."
      key:
        current: Current
        unknown: "No such setting `{{module}}.{{key}}`."
      editors:
        bool-true: "True"
        bool-false: "False"
      modals:
        edit-title: "Edit {{key}}"
        edit-label: "Value ({{type}})"
        array-hint: One value per line.
        reset-label: Reset to default?
        reset-yes: "Yes"
        reset-no: "No"
      values:
        unset: _unset_
        empty: _empty_
      node:
        object-desc: Edit each field, or open a nested list.
        items: "{{count}} item(s)"
        fields: "{{count}} field(s)"
        empty: _(empty — add one below)_
        item-n: "Item {{n}}"
        gone: That item no longer exists — it may have been removed.
        reset-confirm: Reset this to its default? This can't be undone.
      pagination: "Page {{page}}/{{pages}}"
      buttons:
        back: Back
        refresh: Refresh
        close: Close
        open: Open
        edit: Edit
        add: Add
        reset: Reset
        cancel: Cancel
        confirm-delete: Confirm delete
        confirm-reset: Confirm reset
      errors:
        closed: Closed.
        unknown-setting: Unknown setting.
      io:
        scope:
          all: all modules
        buttons:
          export-all: Export
          export: Export
          import: Import
          apply: Apply
          cancel: Cancel
        export:
          ready: "📤 Here's your settings export (**{{scope}}**, {{count}} module(s)). Import it on another server — even a different bot — with the **Import** button."
        import:
          title-all: Import settings
          title-module: "Import {{name}} settings"
          file-label: Settings file (.json)
          file-desc: Upload a file made with the Export button.
          cancelled: ↩️ Import cancelled — nothing was changed.
        report:
          title: 📥 Import preview
          source: "From {{bot}} · {{count}} module(s) in file"
          replace-warning: "Replace mode: for each imported module, keys not in the file are reset to their defaults. Review below, then Apply."
          module-missing: "`{{name}}` — not on this bot, skipped."
          module-counts: "apply {{apply}} · reset {{reset}} · skip {{skip}}"
          module-version: "made for {{name}} v{{from}}, this bot runs v{{to}}"
          key-unknown: no such setting here
          key-type: "type changed ({{from}} → {{to}})"
          key-invalid: "invalid — {{error}}"
          more-keys: "+{{count}} more key(s) skipped"
          more-modules: "+{{count}} more module(s) in file"
          totals: "Total — apply {{apply}} · reset {{reset}} · skip {{skip}}"
        apply:
          summary: "✅ Import complete — {{apply}} applied, {{reset}} reset to default, {{skip}} skipped, {{missing}} module(s) not on this bot."
        errors:
          module-unknown: "No such module `{{name}}`."
          nothing-to-export: There's nothing to export.
          no-file: No file was uploaded.
          too-large: "That file is too large (max {{max}} KB)."
          not-json: That file isn't valid JSON.
          wrong-format: That doesn't look like a settings export from this bot.
          wrong-version: "Unsupported export version ({{version}})."
          fetch-failed: Couldn't download the uploaded file — please try again.
          expired: This import preview has expired — please upload the file again.
      cmdperms:
        home:
          commands-field: Commands
          readonly: read-only
          none: _(no commands)_
          all-commands: All commands (integration default)
          view-placeholder: View a command in detail…
        default:
          everyone: everyone
          admins-only: administrators only
          requires: "requires {{perms}}"
        detail:
          title: "🔐 /{{name}}"
          default: Default
          no-overrides: No overrides
        all-channels: All channels
        pagination: "Page {{page}}/{{pages}}"
        buttons:
          refresh: Refresh
          open-integrations: Open Integrations
          back: Back
        errors:
          fetch-failed: Couldn't read the live permissions from Discord — showing what's available. Try Refresh.
  stats:
    name: stats
    description: View bot statistics and information.
    embed:
      title: "STATISTICS"
      memusage: "⚙️ Memory Usage"
      uptime: "⏱️ Uptime"
      versions: "🔢 Versions"
      creationdate: "🎂 Creation date"
  setlang:
    name: setlang
    description: Set your preferred language for the bot
    options:
      language:
        name: language
        description: The language you want to set
    messages:
      invalidLang: ":warning: The specified language is not supported."
      success: ":flag_gb: Your preferred language has been set to **English**!"
      reset: ":globe_with_meridians: From now on your language will be synchronized to the default language!"
